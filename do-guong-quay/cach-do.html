*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

.bar{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.bar h1{font-size:16px;font-weight:700;letter-spacing:-0.01em}

.bar .back{font-size:12.5px;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:6px 11px;flex:none}
.bar .back:hover{color:var(--ink);border-color:var(--turq)}
.spacer{flex:1}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer}
.chip:hover{color:var(--ink);border-color:var(--line2)}
.chip.on{color:var(--turq-strong);border-color:var(--turq);background:var(--turq-soft)}
#themeToggle{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer}

.stage{flex:1;position:relative;min-height:0}
.stage svg{position:absolute;inset:0;width:100%;height:100%;display:block}

.zone rect{fill:none;stroke:var(--line);stroke-dasharray:5 5;rx:16}
.ztitle{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.12em;fill:var(--faint);text-transform:uppercase}
.zsub{font-family:var(--sans);font-size:11px;fill:var(--faint)}

.node{cursor:pointer}
.node rect{fill:var(--surface);stroke:var(--line2);stroke-width:1;rx:10}
.node:hover rect{stroke:var(--turq)}
.node.sel rect{stroke:var(--turq);stroke-width:1.6}
.node .t{font-family:var(--sans);font-size:13.5px;font-weight:700;fill:var(--ink)}
.node .m{font-family:var(--sans);font-size:10.5px;fill:var(--muted)}
.node.doorA rect{stroke:var(--turq);stroke-width:1.4}
.node.doorB rect{stroke:var(--peri);stroke-width:1.4}
.node.doorC rect{stroke:var(--line2)}
.node.dead rect{stroke-dasharray:4 4;fill:none}
.node.dead .t{fill:var(--faint);text-decoration:line-through}
.node.dead .m{fill:var(--faint)}
.freetext{font-family:var(--sans);font-size:11px;fill:var(--muted)}

.edge{fill:none;stroke:var(--faint);stroke-width:1.4;marker-end:url(#arw)}
.edge.dash{stroke-dasharray:4 5}
.edge.dead{stroke-dasharray:3 6;opacity:0.7}
.elbl{font-family:var(--mono);font-size:10px;fill:var(--muted)}
.deadmark{font-family:var(--mono);font-size:16px;font-weight:600;fill:var(--terra)}

.stage.flowing .edge{opacity:0.12}
.stage.flowing .elbl{opacity:0.12}
.stage.flowing .deadmark{opacity:0.15}
.stage.flowing .node{opacity:0.25}
.stage.flowing .zone,.stage.flowing .freetext{opacity:0.35}
.stage.flowing .edge.lit{opacity:1;stroke:var(--turq);stroke-width:2;stroke-dasharray:7 6;animation:run 0.9s linear infinite;marker-end:url(#arwlit)}
.stage.flowing .elbl.lit{opacity:1;fill:var(--turq-strong)}
.stage.flowing .deadmark.lit{opacity:1}
.stage.flowing .node.lit{opacity:1}
.stage.flowing .node.lit rect{stroke:var(--turq);stroke-width:1.6}
@keyframes run{to{stroke-dashoffset:-13}}
@media (prefers-reduced-motion: reduce){.stage.flowing .edge.lit{animation:none}}

.panel{position:absolute;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 17px;box-shadow:0 8px 28px rgba(0,0,0,0.08)}

#flowcap{left:16px;bottom:16px;max-width:440px;display:none}

#flowcap .fname{font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--turq-strong);margin-bottom:7px}
#flowcap ol{margin-left:18px}

@media (max-width:820px){

const DETAIL = {
  q1:{t:"3 câu về nhịp ngày",m:"đo trục T1 · Guồng quay",b:"Câu mẫu, nguyên văn trong app: “Tuần vừa rồi, việc lặp đi lặp lại (báo cáo, email theo mẫu, tổng hợp, giấy tờ) chiếm bao nhiêu phần ngày làm việc của bạn?” Mỗi câu 4 lựa chọn, từ 0 tới 3 điểm."},
  q2:{t:"3 câu về tay nghề",m:"đo trục T2 · Harness nghề",b:"Câu mẫu: “Nếu phải mô tả sản phẩm cuối cùng của công việc bạn trong MỘT câu?” Đo xem nghề của bạn đã gói lại thành thứ nói được, giao được, ước lượng được chưa."},
  q3:{t:"4 câu về cách nghĩ",m:"đo trục T3 · Tư duy hệ",b:"Câu mẫu: “Nếu ngày mai phải bàn giao việc cho một người mới, bạn đưa họ cái gì?” Trục dày câu nhất, vì đây là nền để nuôi một hệ sau khoá."},
  q4:{t:"2 câu về sức bền thân",m:"đo trục T4 · Kỷ luật thân",b:"Câu mẫu: “Tuần vừa rồi bạn vận động ra mồ hôi mấy lần?” Nghe không liên quan tới AI, nhưng người giữ được một thói quen thân thể thường nuôi được một hệ."},

  t1:{t:"T1 · Guồng quay",m:"ngưỡng đạt 55%",b:"Trục gác cổng: guồng của bạn có đang siết thật không. T1 không đạt nghĩa là ngày còn chỗ thở, và app sẽ nói thẳng là chưa cần mua gì."},

  do:{name:"Một lượt đo 5 tới 7 phút",
    edges:["e-c1","e-c2","e-c3","e-c4","e-c5","e-t1","e-t2","e-t3","e-t4","e-t5"],
    nodes:["q1","q2","q3","q4","q5","t1","t2","t3","t4","t5","doc"],
    steps:["14 câu, mỗi câu 4 lựa chọn, không có câu nào đúng hay sai","Mỗi câu chảy vào đúng một trục, điểm cộng dồn theo trục","Trục so với ngưỡng đạt riêng của nó, ra hình dạng guồng quay của bạn","Bản đọc dựng từ số của chính bạn: chỗ siết, chỗ thở, một việc làm ngay"]},
  cua:{name:"Ba cửa quyết định ra sao",
    edges:["e-dA","e-dB","e-dC"],
    nodes:["doc","t1","doorA","doorB","doorC"],
    steps:["T1 Guồng quay là trục gác cổng: guồng chưa siết thì ra cửa C, không bán gì","T1 đạt nhưng nền nuôi hệ còn thiếu: cửa B, gỡ một việc trước, 3 giờ 1-1","Đủ cả 5 trục: cửa A, mời giữ chỗ khoá 8 buổi, xác nhận qua cuộc gọi 15 phút","Cửa nào cũng cầm được bản đọc về, app không ép ai bước vào đâu"]},
  data:{name:"Câu trả lời đi đâu",
    edges:["e-server"],
    nodes:["data","server"],
    steps:["App chạy trọn trong trình duyệt của bạn, không có đường mạng ra","Không xin email, không đăng nhập; đo dở thì máy bạn nhớ chỗ dở, đo xong là xoá","Muốn tự kiểm không cần biết code: tắt mạng đi, app vẫn chạy hết 14 câu","Vì app này để bạn nhìn rõ mình, không phải để gom danh sách khách"]}
};

const stage=document.getElementById('stage');
const nodes=document.querySelectorAll('.node');
const edges=document.querySelectorAll('.edge');
const elbls=document.querySelectorAll('.elbl');
const dmarks=document.querySelectorAll('.deadmark');
const chips=document.querySelectorAll('.chip');
const fcap=document.getElementById('flowcap');
const detail=document.getElementById('detail');

function setFlow(key){
  chips.forEach(c=>c.classList.toggle('on',c.dataset.flow===key));
  edges.forEach(e=>e.classList.remove('lit'));
  elbls.forEach(l=>l.classList.remove('lit'));
  dmarks.forEach(l=>l.classList.remove('lit'));
  nodes.forEach(n=>n.classList.remove('lit'));
  if(key==='all'){stage.classList.remove('flowing');fcap.classList.remove('show');return}
  const f=FLOWS[key];
  stage.classList.add('flowing');
  f.edges.forEach(id=>document.getElementById(id)?.classList.add('lit'));
  elbls.forEach(l=>{if(f.edges.includes(l.dataset.e))l.classList.add('lit')});
  dmarks.forEach(l=>{if(f.edges.includes(l.dataset.e))l.classList.add('lit')});
  f.nodes.forEach(k=>document.querySelector(`.node[data-k="${k}"]`)?.classList.add('lit'));
  document.getElementById('f-name').textContent=f.name;
  document.getElementById('f-steps').innerHTML=f.steps.map(s=>`<li>${s}</li>`).join('');
  fcap.classList.add('show');
}
chips.forEach(c=>c.addEventListener('click',()=>setFlow(c.dataset.flow)));

nodes.forEach(n=>n.addEventListener('click',()=>{
  nodes.forEach(x=>x.classList.remove('sel'));
  n.classList.add('sel');
  const d=DETAIL[n.dataset.k];
  if(!d)return;
  document.getElementById('d-title').textContent=d.t;
  document.getElementById('d-meta').textContent=d.m;
  document.getElementById('d-body').textContent=d.b;
  detail.classList.add('show');
}));
document.getElementById('dclose').addEventListener('click',()=>{detail.classList.remove('show');nodes.forEach(x=>x.classList.remove('sel'))});

document.getElementById('themeToggle').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('lch-theme',next)}catch(e){}
});
</script>
